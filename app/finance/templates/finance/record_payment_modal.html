<div class="modal-content">
    <div class="modal-header">
        <h5 class="modal-title">Enregistrer un paiement</h5>
        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"></button>
    </div>
    <form hx-post="{% url 'finance:record_payment' %}{% if request.GET.person_id %}?person_id={{ request.GET.person_id }}{% endif %}"
          hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
          hx-target="#dialog">
        <div class="modal-body">
            {{ form.person_id }}
            <div class="mb-3">
                <label for="id_amount" class="form-label">{{ form.amount.label }}</label>
                {{ form.amount }}
                {% for error in form.amount.errors %}
                    <div class="text-danger">{{ error }}</div>
                {% endfor %}
            </div>
            <div class="mb-3">
                <label for="id_date" class="form-label">{{ form.date.label }}</label>
                {{ form.date }}
                {% for error in form.date.errors %}
                    <div class="text-danger">{{ error }}</div>
                {% endfor %}
            </div>
            <div class="mb-3">
                <label for="id_note" class="form-label">{{ form.note.label }}</label>
                {{ form.note }}
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
            <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
    </form>
</div>
